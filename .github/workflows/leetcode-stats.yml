name: Update LeetCode stats

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes; commits only when stats actually changed
  workflow_dispatch: # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SVG
        run: node scripts/generate-leetcode-svg.mjs leetcode-stats.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leetcode-stats.svg
          git diff --staged --quiet || (git commit -m "chore: update LeetCode stats" && git push)
