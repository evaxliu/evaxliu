name: Update LeetCode stats

on:
  repository_dispatch:
    types: [leetcode-submission]

  # Backup in case the browser trigger fails
  schedule:
    - cron: "2/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-leetcode-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for LeetCode to update
        if: github.event_name == 'repository_dispatch'
        run: sleep 10

      - name: Generate SVG
        run: node scripts/generate-leetcode-svg.mjs leetcode-stats.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add leetcode-stats.svg

          git diff --staged --quiet || {
            git commit -m "chore: update LeetCode stats"
            git push
          }
